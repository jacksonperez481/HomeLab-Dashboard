version: "3.8"

services:
  dashboard:
    build: .
    container_name: homelab-dashboard
    ports:
      - "8003:8003"
    restart: always
    network_mode: host
    pid: host
    volumes:
      - /run/systemd:/run/systemd:ro
      - /var/run/dbus:/var/run/dbus:ro
      - ./logs:/app/logs
    environment:
      - ROUTER_IP=${ROUTER_IP:-192.168.1.1}
    privileged: true
